name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "21"
          cache: "npm"

      - name: Install npm dependencies
        working-directory: openclaw-android
        run: npm ci --ignore-scripts || npm install

      - name: Build Vue frontend
        working-directory: openclaw-android
        # Use build:frontend:bundle (vite build only) instead of
        # build:frontend (vue-tsc --noEmit && vite build) so the APK
        # build is not blocked by pre-existing source-code type errors.
        # Run `npm run type-check` separately for the same coverage.
        run: npm run build:frontend:bundle

      - name: Build CLI server
        working-directory: openclaw-android
        run: npm run build:cli

      - name: Bundle server into APK assets
        run: bash android/scripts/build-server-bundle.sh

      - name: Download Termux bootstrap
        run: bash android/scripts/download-bootstrap.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: android/app/build/outputs/apk/debug/anyclaw.apk

      - name: Generate changelog
        if: github.ref_type == 'branch'
        run: |
          # Cap to most recent 50 commits so the body stays well under ARG_MAX
          # when passed to softprops/action-gh-release (which interpolates
          # 'body:' onto the node process command line).
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --reverse -n 50 > /tmp/changes.txt || true
          else
            git log --pretty=format:"- %s" --reverse -n 50 > /tmp/changes.txt || true
          fi
          {
            echo "🦞 **AnyClaw** — OpenClaw + Codex on Android"
            echo ""
            echo "📱 Install the APK on any ARM64 Android 7.0+ device. No root required."
            echo ""
            echo "### Changes"
            cat /tmp/changes.txt
            echo ""
            echo "---"
            echo "Branch: ${{ github.ref_name }}"
            echo "Built from commit ${{ github.sha }}"
          } > /tmp/release-body.md
          echo "Wrote $(wc -l < /tmp/release-body.md) lines to /tmp/release-body.md"

      - name: Create Release
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnyClaw v${{ github.run_number }} (${{ github.ref_name }})"
          body_path: /tmp/release-body.md
          files: android/app/build/outputs/apk/debug/anyclaw.apk
          draft: false
          prerelease: false
